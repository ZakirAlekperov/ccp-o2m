version: '3.8'

services:
  # PostgreSQL with PostGIS
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: ccp_o2m
      POSTGRES_USER: ccp_o2m
      POSTGRES_PASSWORD: ccp_o2m_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccp_o2m"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DEBUG: "True"
      DATABASE_URL: "postgres://ccp_o2m:ccp_o2m_password@db:5432/ccp_o2m"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "django-insecure-dev-key-change-in-production"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # Celery Worker
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DEBUG: "True"
      DATABASE_URL: "postgres://ccp_o2m:ccp_o2m_password@db:5432/ccp_o2m"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "django-insecure-dev-key-change-in-production"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      - db
      - redis
    command: >
      sh -c "celery -A ccp_o2m worker -l info"

  # Celery Beat (scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DEBUG: "True"
      DATABASE_URL: "postgres://ccp_o2m:ccp_o2m_password@db:5432/ccp_o2m"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: "django-insecure-dev-key-change-in-production"
    volumes:
      - ./backend:/app
      - media_files:/app/media
    depends_on:
      - db
      - redis
    command: >
      sh -c "celery -A ccp_o2m beat -l info"

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: "http://localhost:8000/api"
    command: >
      sh -c "npm install && npm run dev -- --host"

volumes:
  postgres_data:
  redis_data:
  media_files:
